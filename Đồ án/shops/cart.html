<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng của bạn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background-color: #f8f9fa;">

<div class="container my-5">
    <h2 class="mb-4"><i class="fas fa-shopping-cart"></i> Giỏ hàng của bạn</h2>
    
    <div class="row">
        <div class="col-lg-8">
            <div class="card shadow-sm mb-3">
                <div class="card-body">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th>Sản phẩm</th>
                                <th>Giá</th>
                                <th>Số lượng</th>
                                <th>Tổng</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <img src="https://cdn2.cellphones.com.vn/insecure/rs:fill:358:358/q:90/plain/https://cellphones.com.vn/media/catalog/product/i/p/iphone-15-plus_1__1.png" alt="Sản phẩm" style="width: 50px; margin-right: 15px;">
                                        <span>iPhone 15 Pro Max</span>
                                    </div>
                                </td>
                                <td>28.000.000đ</td>
                                <td><input type="number" value="1" class="form-control w-50"></td>
                                <td class="fw-bold">28.000.000đ</td>
                                <td><button class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <a href="../index.html" class="btn btn-link text-decoration-none"><i class="fas fa-arrow-left"></i> Tiếp tục mua sắm</a>
        </div>

        <div class="col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Tóm tắt đơn hàng</h5>
                    <hr>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Tạm tính:</span>
                        <span>28.000.000đ</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3">
                        <span class="fw-bold text-primary">Tổng cộng:</span>
                        <span class="fw-bold text-danger">28.000.000đ</span>
                    </div>
                    <button class="btn btn-primary w-100 py-2" style="background-color: #004AAD;">Tiến hành thanh toán</button>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
