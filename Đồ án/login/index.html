<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - SmartPhone Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-section">
                <img src="../img/logo/2(1)(1).png" alt="Logo HUEIC">
                <h2>Chào mừng trở lại!</h2>
                <p>Đăng nhập để tiếp tục trải nghiệm</p>
            </div>

            <form action="#">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" placeholder="Tên đăng nhập hoặc Email" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Mật khẩu" required>
                </div>

                <div class="options">
                    <label><input type="checkbox"> Ghi nhớ tôi</label>
                    <a href="#">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="login-btn">ĐĂNG NHẬP</button>
            </form>

            <div class="register-link">
                Bạn chưa có tài khoản? <a href="#">Đăng ký ngay</a>
            </div>
            
            <div class="back-home">
                <a href="../index.html"><i class="fa-solid fa-arrow-left"></i> Quay lại trang chủ</a>
            </div>
        </div>
    </div>
</body>
</html>
